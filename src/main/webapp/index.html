<!DOCTYPE html>
<html>
<head>
    <title>e-Hotels | Find a Room</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="scripts.js"></script>
</head>
<body>

    <header>
        <h1>e-Hotels</h1>
        <p>Luxury & Comfort Across North America</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Search for Available Rooms</h2>
            
            <form action="searchRooms" method="GET">
                <label for="area">City/Area:</label>
                <input type="text" id="area" name="area" placeholder="e.g., Ottawa" required>
                
                <label for="capacity">Room Capacity:</label>
                <select id="capacity" name="capacity">
                    <option value="1">1 Person (Single)</option>
                    <option value="2">2 People (Double)</option>
                    <option value="3">3 People</option>
                    <option value="4">4 People</option>
                </select>
                
                <input type="submit" value="Search Rooms">
            </form>
        </div>
        <div style="text-align: center; margin-top: 20px;">
             <a href="employee.html">Employee Portal</a> | <a href="admin.html">Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
